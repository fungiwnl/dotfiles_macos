set -g default-terminal "screen-256color"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind-key | split-window -h -c "#{pane_current_path}" 

unbind '"'
bind-key - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy
bind-key -T prefix h run-shell -b "zsh -i -c 'history -r ~/.zsh_history'"

set -g mouse on

# Prefer RGB colors in modern terminals so tmux matches the Catppuccin palette
# used in Ghostty and Neovim more closely.
set -as terminal-features ',xterm-ghostty:RGB,alacritty:RGB'

# Catppuccin-flavored status bar.
# A dark base makes the bar feel visually slimmer in Ghostty, and the higher
# contrast right side fixes the washed-out Continuum segment.
set -g status-style 'bg=#181825,fg=#cdd6f4'
set -g status-left-length 20
set -g status-right-length 50
set -g status-left '#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#181825,nobold] '
set -g window-status-separator '  '
set -g window-status-format '#[fg=#a6adc8]#I #W'
set -g window-status-current-format '#[fg=#1e1e2e,bg=#cba6f7,bold] #I #W #[fg=#cba6f7,bg=#181825,nobold] '
set -g status-right '#[fg=#6c7086]#{?client_prefix,PREFIX ,}#[fg=#89b4fa]continuum #[fg=#cdd6f4,bold]#{?continuum_status,#{continuum_status},off}'
set -g message-style 'bg=#89b4fa,fg=#1e1e2e'
set -g mode-style 'bg=#f9e2af,fg=#1e1e2e'

#plugins 
set -g @plugin 'tmux-plugins/resurrect'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

resurrect_dir="$HOME/.tmux/resurrect"
set -g @resurrect-dir $resurrect_dir
set -g @resurrect-hook-post-save-all 'target=$(readlink -f $resurrect_dir/last); sed "s| --cmd .*-vim-pack-dir||g; s|/etc/profiles/per-user/$USER/bin/||g; s|/home/$USER/.nix-profile/bin/||g" $target | sponge $target'
set -g @resurrect-capture-pane-contents 'on'


set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
